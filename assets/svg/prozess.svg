<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" role="img" aria-label="Schritt-für-Schritt-Prozess: Beratung, Prüfung und Ziel">
  <defs><style>.r{fill:#E1322A}.rs{fill:none;stroke:#E1322A;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}.w{fill:#fff}</style></defs>

  <!-- Verbindungslinien -->
  <g fill="none" stroke="#E1322A" stroke-width="3.6" stroke-linecap="round">
    <path d="M300 244 L300 200"/>
    <path d="M262 270 C205 250 172 244 165 212"/>
    <path d="M338 270 C395 250 428 244 435 212"/>
  </g>
  <g class="r">
    <circle cx="300" cy="200" r="5.5"/>
    <circle cx="165" cy="212" r="5.5"/>
    <circle cx="435" cy="212" r="5.5"/>
    <circle cx="262" cy="270" r="5.5"/>
    <circle cx="338" cy="270" r="5.5"/>
  </g>

  <!-- Zahnrad -->
  <g class="r">
    <g>
      <rect x="289" y="220" width="22" height="28" rx="5"/>
      <rect x="289" y="220" width="22" height="28" rx="5" transform="rotate(45 300 300)"/>
      <rect x="289" y="220" width="22" height="28" rx="5" transform="rotate(90 300 300)"/>
      <rect x="289" y="220" width="22" height="28" rx="5" transform="rotate(135 300 300)"/>
      <rect x="289" y="220" width="22" height="28" rx="5" transform="rotate(180 300 300)"/>
      <rect x="289" y="220" width="22" height="28" rx="5" transform="rotate(225 300 300)"/>
      <rect x="289" y="220" width="22" height="28" rx="5" transform="rotate(270 300 300)"/>
      <rect x="289" y="220" width="22" height="28" rx="5" transform="rotate(315 300 300)"/>
    </g>
    <circle cx="300" cy="300" r="60"/>
  </g>
  <circle cx="300" cy="300" r="27" class="w"/>

  <!-- Kachel links: Person -->
  <rect x="115" y="130" width="100" height="100" rx="14" class="w" stroke="#E1322A" stroke-width="5"/>
  <g class="r">
    <circle cx="165" cy="166" r="14"/>
    <path d="M141 208 a24 26 0 0 1 48 0 Z"/>
  </g>

  <!-- Kachel oben: Checkliste -->
  <rect x="250" y="60" width="100" height="100" rx="14" class="w" stroke="#E1322A" stroke-width="5"/>
  <g class="r">
    <rect x="270" y="86" width="10" height="10" rx="2"/>
    <rect x="270" y="104" width="10" height="10" rx="2"/>
    <rect x="270" y="122" width="10" height="10" rx="2"/>
  </g>
  <g class="rs"><path d="M288 91 H326"/><path d="M288 109 H326"/><path d="M288 127 H318"/></g>
  <g><circle cx="328" cy="130" r="15" class="r"/><path d="M321 130 l5 5 9 -10" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></g>

  <!-- Kachel rechts: Ziel -->
  <rect x="385" y="130" width="100" height="100" rx="14" class="w" stroke="#E1322A" stroke-width="5"/>
  <g>
    <circle cx="432" cy="178" r="23" class="rs"/>
    <circle cx="432" cy="178" r="12" class="rs"/>
    <circle cx="432" cy="178" r="4" class="r"/>
    <path d="M468 142 l-30 30" class="rs"/>
